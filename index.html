<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lock Screen Professional V4</title>
    
    <!-- 添加 PWA 配置文件链接（新增） -->
    <link rel="manifest" href="manifest.json">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "PingFang SC", "SF Pro Display", sans-serif;
            -webkit-font-smoothing: antialiased;
        }

        body, html {
            height: 100%;
            overflow: hidden;
        }

        .container {
            height: 100vh;
            width: 100vw;
            background: url('https://i.imgs.ovh/2026/05/07/fde8387f9d42fa6fa0837cdca8d67693.png') no-repeat center center;
            background-size: cover;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
            padding: 100px 0 60px 0;
            color: #5d6d56;
        }

        /* 时间日期区 */
        .header { text-align: center; }
        .date-text { font-size: 24px; font-weight: 500; margin-bottom: 10px; }
        .time-text { font-size: 110px; font-weight: 600; line-height: 1; letter-spacing: -2px; }

        /* 底部功能区 */
        .bottom-bar {
            width: 100%;
            display: flex;
            justify-content: space-between;
            padding: 0 45px;
        }

        /* 外部灰色底座 - 新尺寸 */
        .icon-circle {
            width: 60px;
            height: 60px;
            background-color: #8c938d;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* SVG 图标尺寸控制 */
        .icon-circle svg {
            width: 85px;
            height: 85px;
        }

        .icon-shape {
            fill: white;
        }

        .line-cut {
            fill: #8c938d;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <div class="date-text" id="date">5月8日周五 · 丙午年三月廿二</div>
        <div class="time-text" id="time">00:20</div>
    </div>

    <div class="bottom-bar">
        <!-- 手电筒图标（左边第一个） -->
        <div class="icon-circle">
            <svg viewBox="0 0 100 100">
                <path class="icon-shape" d="
                    M 34,22 
                    C 34,18 38,15 50,15 
                    C 62,15 66,18 66,22 
                    L 66,26 
                    C 66,32 60,34 58,40 
                    L 58,74 
                    C 58,82 42,82 42,74 
                    L 42,40 
                    C 40,34 34,32 34,26 
                    Z" />
                
                <rect class="line-cut" x="34" y="27" width="32" height="4" />
                
                <rect class="line-cut" x="44.5" y="44" width="11" height="20" rx="5.5" />
                
                <circle class="icon-shape" cx="50" cy="57.5" r="3.5" />
            </svg>
        </div>

        <!-- 相机图标（右边第二个） -->
        <div class="icon-circle">
            <svg viewBox="0 0 100 100">
                <rect class="icon-shape" x="22" y="32" width="56" height="40" rx="10" />
                <path class="icon-shape" d="M 37,32 L 63,32 C 61,24 39,24 37,32 Z" />
                <circle cx="50" cy="53" r="12" fill="none" stroke="#8c938d" stroke-width="4" />
                <circle class="line-cut" cx="67" cy="41" r="2.5" />
            </svg>
        </div>
    </div>
</div>

<script>
    function update() {
        const d = new Date();
        const h = String(d.getHours()).padStart(2, '0');
        const m = String(d.getMinutes()).padStart(2, '0');
        document.getElementById('time').textContent = `${h}:${m}`;
        
        const month = d.getMonth() + 1;
        const date = d.getDate();
        const dayArr = ['周日', '周一', '周二', '周三', '周四', '周五', '周六'];
        const day = dayArr[d.getDay()];
        document.getElementById('date').textContent = `${month}月${date}日${day} · 丙午年三月廿二`;
    }
    setInterval(update, 1000);
    update();
    
    // 注册 Service Worker（新增）
    if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('/sw.js');
    }
</script>

</body>
</html>
